version: 2

build:
  os: ubuntu-lts-latest
  tools:
    python: "3"
  jobs:
    build:
      post_checkout:
        - pip install --upgrade pip
        - pip install poetry
        - poetry install --with dev

sphinx:
  configuration: docs/conf.py

python:
  install:
    - method: pip
      path: .

formats:
  - htmlzip
  - pdf

readthedocs:
  version: 2
